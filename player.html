<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Jerry — Jogador</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { max-width: 560px; margin: 0 auto; padding: 20px 16px; }
    .hero { background: var(--s1); border-radius: 16px; padding: 24px; margin-bottom: 20px; text-align: center; }
    .hero-name { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
    .pairing-card { border-radius: 12px; overflow: hidden; margin-bottom: 20px; border: 1px solid var(--bd); }
    .pairing-header { background: var(--it); color: #fff; padding: 12px 16px; font-weight: 600; font-size: 13px; }
    .pairing-body { background: var(--s1); padding: 16px; }
    .vs-row { display: flex; align-items: center; gap: 10px; }
    .vs-name { flex: 1; font-size: 17px; font-weight: 600; }
    .vs-mid  { color: var(--t2); font-size: 12px; font-weight: 500; flex-shrink: 0; }
    .table-badge { background: var(--it); color: #fff; border-radius: 8px; padding: 6px 14px; font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 14px; display: inline-block; }
    .stand-row { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-bottom: 1px solid var(--bd); }
    .stand-pos  { font-weight: 700; min-width: 28px; font-size: 15px; }
    .stand-name { flex: 1; font-size: 14px; }
    .stand-pts  { font-family: var(--mono); font-weight: 700; font-size: 15px; color: var(--it); }
    .highlight  { background: var(--ib) !important; }
    .timer-pub  { font-size: 36px; font-weight: 700; font-variant-numeric: tabular-nums; text-align: center; padding: 12px 0 4px; }
    .phase-label { text-align: center; font-size: 12px; color: var(--t2); margin-bottom: 16px; }
    .error-msg  { text-align: center; padding: 60px 20px; color: var(--t2); }
  </style>
</head>
<body>
<div id="app"><div class="error-msg"><i class="ti ti-loader" style="font-size:32px"></i><p>Carregando...</p></div></div>
<script>
const SB_URL = 'https://dlzfxzkvcdycvovnqeya.supabase.co';
const SB_KEY = 'sb_publishable_D7HJx2dydwnyZtgbf-tOOw_YvEDMfgs';

function fmt(s) {
  const m = Math.floor(Math.abs(s)/60), sec = Math.abs(s)%60;
  return (s<0?'-':'') + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function pct(v) { return v != null ? Math.round(v*100)+'%' : '—'; }
function badge(d) {
  const m = {Junior:'<span class="badge bd">J</span>',Senior:'<span class="badge bw">S</span>',Master:'<span class="badge bs">M</span>'};
  return m[d]||'';
}

async function sbGet(table, qs) {
  const r = await fetch(SB_URL+'/rest/v1/'+table+(qs||''), {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer '+SB_KEY }
  });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

// Parse URL: /player.html?id=PLAYERID&tour=TOURID
const params  = new URLSearchParams(location.search);
const playerId = params.get('id');
const tourId   = params.get('tour');

async function load() {
  try {
    if (!playerId) { render(null, null, null); return; }

    const [players, tours] = await Promise.all([
      sbGet('players', '?order=name.asc'),
      sbGet('tournaments', '?order=created_at.desc'),
    ]);

    const gp = players.find(p => p.id === playerId);
    if (!gp) { render(null, null, null); return; }

    // Find active tournament — prefer query param, else latest with this player
    let tour = null;
    const allTours = tours.map(r => {
      try { return typeof r.full_state === 'string' ? JSON.parse(r.full_state) : r.full_state; } catch(e) { return null; }
    }).filter(Boolean);

    if (tourId) {
      tour = allTours.find(t => t.id === tourId);
    } else {
      // Latest active or most recent finished tour with this player
      tour = allTours.find(t =>
        (t.status === 'rounds' || t.status === 'topcut') &&
        t.players.some(p => p.gid === playerId)
      ) || allTours.find(t => t.players.some(p => p.gid === playerId));
    }

    render(gp, tour, players);
  } catch(e) {
    document.getElementById('app').innerHTML =
      '<div class="error-msg"><i class="ti ti-alert-circle" style="font-size:32px;color:var(--er)"></i><p>Erro ao carregar dados</p></div>';
  }
}

function getStandings(players, rounds, div) {
  const active = div ? players.filter(p=>p.division===div) : players;
  const stats = {};
  active.forEach(p => { stats[p.id] = { id:p.id, gid:p.gid, name:p.name, division:p.division, dropped:p.dropped, w:0,l:0,t:0,mp:0,gp:[] }; });
  rounds.forEach(rnd => {
    rnd.pairings.forEach(pair => {
      const s1=stats[pair.p1], s2=pair.p2==='BYE'?null:stats[pair.p2];
      if(!s1) return;
      if(pair.isBye){s1.w++;s1.mp+=3;return;}
      if(!s2) return;
      if(pair.result==='p1'){s1.w++;s1.mp+=3;s2.l++;}
      else if(pair.result==='p2'){s2.w++;s2.mp+=3;s1.l++;}
      else if(pair.result==='tie'){s1.t++;s2.t++;s1.mp++;s2.mp++;}
      else if(pair.result==='dl'){s1.l++;s2.l++;}
      s1.gp.push(s2.id); s2.gp.push(s1.id);
    });
  });
  const all = Object.values(stats);
  const gamesOf = id => { const s=stats[id]; return s ? Math.max(1, s.w+s.l+s.t) : 1; };
  const wpOf    = id => { const s=stats[id]; return s ? s.mp/(gamesOf(id)*3) : 0; };
  all.forEach(p => {
    p.owp  = p.gp.length ? p.gp.reduce((a,id)=>a+Math.max(0.25,wpOf(id)),0)/p.gp.length : 0;
    p.oowp = p.gp.length ? p.gp.reduce((a,id)=>{const s=stats[id];return a+(s?s.gp.reduce((b,id2)=>b+Math.max(0.25,wpOf(id2)),0)/Math.max(1,s.gp.length):0);},0)/p.gp.length : 0;
  });
  return all.sort((a,b)=>b.mp-a.mp||b.owp-a.owp||b.oowp-a.oowp);
}

function render(gp, tour, allPlayers) {
  if (!gp) {
    document.getElementById('app').innerHTML = '<div class="error-msg"><i class="ti ti-user-off" style="font-size:32px"></i><p>Jogador não encontrado</p></div>';
    return;
  }

  const tp = tour ? tour.players.find(p => p.gid === playerId) : null;
  let pairingHTML = '';
  let standHTML   = '';
  let timerHTML   = '';

  if (tour && tp && (tour.status === 'rounds' || tour.status === 'topcut')) {
    const rnd = tour.rounds[tour.currentRound - 1];
    const pair = rnd?.pairings.find(p => p.p1 === tp.id || p.p2 === tp.id);

    // Timer
    if (tour.timerStartedAt && !tour._timerPausedAt) {
      const elapsed  = Math.floor((Date.now() - tour.timerStartedAt) / 1000);
      const mins     = tour.settings?.timerMinutes || 50;
      const remaining = Math.max(0, mins * 60 - elapsed);
      const cls = remaining < 300 ? 'tc2' : remaining < 600 ? 'tw' : '';
      timerHTML = `
        <div class="card mb16">
          <div class="timer-pub ${cls}" id="pub-timer">${fmt(remaining)}</div>
          <div class="phase-label">Rodada ${tour.currentRound}/${tour.settings.totalRounds} em andamento</div>
        </div>`;
      // Start countdown in browser
      setTimeout(() => startPubTimer(tour.timerStartedAt, mins), 100);
    }

    if (pair) {
      const isBye   = pair.p2 === 'BYE';
      const oppId   = pair.p1 === tp.id ? pair.p2 : pair.p1;
      const oppName = isBye ? 'BYE' : (tour.players.find(p=>p.id===oppId)?.name || '?');
      const resultLabel = pair.result ? ({p1:'P1 ganhou',p2:'P2 ganhou',tie:'Empate',dl:'Double Loss'}[pair.result]||'—') : 'Aguardando...';
      const isP1 = pair.p1 === tp.id;

      pairingHTML = `
        <div class="pairing-card">
          <div class="pairing-header">Rodada ${tour.currentRound} — Mesa ${pair.table||'—'}</div>
          <div class="pairing-body">
            <div class="tc mb12"><span class="table-badge">Mesa ${pair.table||'—'}</span></div>
            <div class="vs-row mb8">
              <span class="vs-name ${isP1?'':'muted'}">${esc(isP1?tp.name:oppName)}</span>
              <span class="vs-mid">P1</span>
            </div>
            <div class="vs-row">
              <span class="vs-name ${!isP1?'':'muted'}">${esc(!isP1?tp.name:oppName)}</span>
              <span class="vs-mid">P2</span>
            </div>
            <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--bd);text-align:center;font-size:13px;color:var(--t2)">
              ${pair.result ? '<strong style="color:var(--t1)">'+resultLabel+'</strong>' : '<span>Resultado pendente</span>'}
            </div>
          </div>
        </div>`;
    }

    // Standings
    const stand = getStandings(tour.players, tour.rounds, tp.division);
    const myPos  = stand.findIndex(p => p.id === tp.id);
    standHTML = `
      <h3 class="mb8">Standings — ${tp.division}</h3>
      <div class="card p0 mb20">
        ${stand.map((p, i) => `
          <div class="stand-row ${p.id===tp.id?'highlight':''}">
            <span class="stand-pos">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</span>
            <span class="stand-name">${esc(p.name)}</span>
            <span class="stand-pts">${p.mp}pts</span>
            <span class="muted" style="font-size:11px;font-family:var(--mono)">${pct(p.owp)}</span>
          </div>`).join('')}
      </div>`;
  }

  const totalTours = allPlayers ? 0 : 0;

  document.getElementById('app').innerHTML = `
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:11px;color:var(--t2);font-weight:600;letter-spacing:.1em">JERRY · POKÉMON TCG</div>
    </div>
    <div class="hero">
      <div class="hero-name">${esc(gp.name)}</div>
      <div class="fx gap6 jc mt6">${badge(tp?.division||'Master')} ${gp.playerId?'<span class="mono muted small">'+esc(gp.playerId)+'</span>':''}</div>
    </div>
    ${tour ? `<div class="muted small tc mb12">Torneio: <strong>${esc(tour.name)}</strong></div>` : ''}
    ${timerHTML}
    ${pairingHTML || (tour && tp ? '<div class="card tc muted mb16">Sem pareamento nesta rodada</div>' : '<div class="card tc muted mb16">Nenhum torneio ativo encontrado</div>')}
    ${standHTML}
    <div style="text-align:center;margin-top:20px;font-size:11px;color:var(--t2)">
      Atualização automática a cada 15s · <a href="rank.html" style="color:var(--it)">Ver ranking</a>
    </div>`;
}

function startPubTimer(startedAt, mins) {
  setInterval(() => {
    const elapsed   = Math.floor((Date.now() - startedAt) / 1000);
    const remaining = Math.max(0, mins * 60 - elapsed);
    const el = document.getElementById('pub-timer');
    if (!el) return;
    el.textContent = fmt(remaining);
    el.className   = 'timer-pub ' + (remaining < 300 ? 'tc2' : remaining < 600 ? 'tw' : '');
  }, 1000);
}

// Auto-refresh
load();
setInterval(load, 15000);
</script>
</body>
</html>
