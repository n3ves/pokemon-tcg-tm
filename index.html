<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jerry — TCG Tournament Manager</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/style.css">
<script>
window.onerror = function(msg, src, line, col, err) {
  document.getElementById('app').innerHTML =
    '<div style="padding:20px;font-family:monospace;background:#fef2f2;color:#dc2626;border-radius:8px;margin:20px">' +
    '<strong>Erro JS (v' + (typeof VER!=="undefined"?VER:"?") + '):</strong><br>' + msg +
    '<br><small>' + (src||'') + ':' + line + '</small>' +
    '<br><pre style="margin-top:8px;font-size:11px;white-space:pre-wrap">' + (err&&err.stack||'') + '</pre></div>';
  return false;
};
</script>
<!-- App scripts em ordem de dependência -->
<script defer src="js/config.js"></script>
<script defer src="js/engine.js"></script>
<script defer src="js/app.js"></script>
</head>
<body>
<div id="app"></div>
</body>
</html>
